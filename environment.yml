# =============================================================================
# PGIRL Conda Environments
# =============================================================================
#
# This project uses 3 separate conda environments to avoid version conflicts.
# Each environment includes nextflow for pipeline orchestration.
#
# Create all three with:
#   conda env create -f envs/pgirl_nextstrain.yml
#   conda env create -f envs/pgirl_db.yml
#   conda env create -f envs/pgirl_analysis.yml
#
# Or use setup.sh to create them automatically.
#
# Environment roles:
#   pgirl_nextstrain  — Nextclade classification, nextstrain/ebola phylogenetics
#                        (nextstrain-cli, augur, nextclade, snakemake, mafft, iqtree)
#   pgirl_db          — Database queries, epi data gathering (future)
#                        (psycopg2, pandas, sqlalchemy, requests)
#   pgirl_analysis    — Evidence integration, intelligence synthesis (future)
#                        (biopython, scipy, networkx, matplotlib, dendropy)
#
# The bioinformatics pipeline (current) uses pgirl_nextstrain.
# Activate it with:
#   conda activate pgirl_nextstrain
#   nextflow run main.nf
# =============================================================================
#
# This file is kept for reference. See envs/ for the actual environment files.
name: pgirl_nextstrain
channels:
  - nextstrain
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.10
  - pip
  - git
  - nextflow>=24.0
  - nextstrain-cli>=8.0
  - augur>=25.0
  - auspice>=2.53
  - nextclade>=3.0
  - snakemake>=8.0
  - mafft>=7.520
  - iqtree>=2.2
  - raxml-ng>=1.2
  - treetime>=0.11
  - seqkit>=2.6
  - biopython>=1.83
